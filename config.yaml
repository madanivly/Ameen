model_list:
  - model_name: my-primary-coder
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: "YOUR_ACTUAL_GEMINI_API_KEY"

  - model_name: my-backup-coder
    litellm_params:
      model: openrouter/anthropic/claude-3.5-sonnet
      api_key: "YOUR_OPENROUTER_KEY_IF_YOU_HAVE_ONE"

router_settings:
  routing_strategy: "latency-based-routing"
  allowed_fails: 1
  cooldown_time: 30
